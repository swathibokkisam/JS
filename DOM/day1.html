<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let ul=document.createElement("ul");
           for(i=0;i<3;i++){
           let li=document.createElement("li");
           li.innerText=i;
           ul.appendChild(li);
           
        }
        let res=document.body.appendChild(ul);
        console.log(res);
        

        let div=document.createElement("div");
        let p=document.createElement("p");
        div.appendChild(p);
        p.innerText="Lorem ipsum, dolor sit amet consectetur adipisicing elit. Voluptatum voluptatem nihil quisquam assumenda, atque, tempore necessitatibus possimus, quasi rem similique nobis alias repudiandae in illo fugit neque ex accusamus dolorem.Quasi, odio esse repellendus hic ducimus quia quod eaque voluptatibus sed veniam voluptas autem. Tempore, at ipsa, autem nisi vel eos aliquid unde quia non aspernatur amet, libero cum porro!";
        console.log(document.body.appendChild(div));
        

        let nest=document.createElement("div");
        let h=document.createElement("h1");
        let p1=document.createElement("p");
        nest.appendChild(h);
        nest.appendChild(p1);
        h.innerText="good morning";
        p1.innerText="had your dinner";
        console.log(document.body.appendChild(nest));
        

        let table=document.createElement("table");
        table.border="1";
        table.style.borderCollapse="collapse";
        let row=document.createElement("tr");
        var arr=["chicken","juice","haleeam"]
        arr.forEach(text=>{
            let data=document.createElement("td");
              data.innerText=text;
              row.appendChild(data);
        })
            table.appendChild(row);
        console.log(document.body.appendChild(table));
        

        let div1=document.createElement("div");
        // let br=document.createElement("br");
        var arr=["submit","Enter","Select","Choose an option","Colse"]
        arr.forEach(items=>{
           let buttons=document.createElement("button");
           buttons.innerText=items;
        //    buttons.appendChild(br);
           div1.appendChild(buttons);
           
        //    buttons.style.display="block";
        
        });
        console.log(document.body.appendChild(div1));
    </script>
</body>
</html>
